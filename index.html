<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipbook — PDF Viewer</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #c8f060;
      --text: #f0f0f0;
      --muted: #666;
      --page-shadow: 0 8px 40px rgba(0,0,0,0.7);
      --radius: 4px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    /* ── UPLOAD SCREEN ── */
    #upload-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 32px;
      padding: 24px;
    }

    .brand {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .upload-title {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      text-align: center;
    }

    .upload-title span {
      color: var(--accent);
    }

    .drop-zone {
      width: min(480px, 90vw);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 56px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--surface);
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: #1a1f12;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      width: 48px;
      height: 48px;
      color: var(--accent);
    }

    .drop-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .drop-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .upload-btn {
      background: var(--accent);
      color: #0e0e0e;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      padding: 14px 32px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .upload-btn:hover { opacity: 0.85; }

    /* ── LOADING ── */
    #loading-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 20px;
    }

    .loader-ring {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-text {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── VIEWER ── */
    #viewer-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* Top bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .doc-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 240px;
    }

    .page-badge {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
    }

    .topbar-center {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:hover:not(:disabled) {
      background: var(--border);
      border-color: #444;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-input-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .page-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      width: 42px;
      height: 28px;
      border-radius: var(--radius);
      text-align: center;
      outline: none;
    }

    .page-input:focus { border-color: var(--accent); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .zoom-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      width: 28px;
      height: 28px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 300;
      transition: background 0.15s;
    }

    .zoom-btn:hover { background: var(--border); }

    .zoom-level {
      font-size: 11px;
      color: var(--muted);
      width: 38px;
      text-align: center;
    }

    .new-file-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .new-file-btn:hover {
      color: var(--text);
      border-color: #444;
    }

    /* Stage */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 32px 16px;
      position: relative;
      background: var(--bg);
    }

    /* Flipbook spread */
    .spread {
      display: flex;
      gap: 0;
      align-items: stretch;
      perspective: 1800px;
      position: relative;
    }

    /* Page slot */
    .page-slot {
      position: relative;
      flex-shrink: 0;
    }

    .page-slot canvas {
      display: block;
      border-radius: 0;
    }

    /* Left page (right edge is spine) */
    .page-left canvas {
      border-radius: var(--radius) 0 0 var(--radius);
      box-shadow: -4px 0 20px rgba(0,0,0,0.5), var(--page-shadow);
    }

    /* Right page (left edge is spine) */
    .page-right canvas {
      border-radius: 0 var(--radius) var(--radius) 0;
      box-shadow: 4px 0 20px rgba(0,0,0,0.5), var(--page-shadow);
    }

    /* Single page (cover / last) */
    .page-single canvas {
      border-radius: var(--radius);
      box-shadow: var(--page-shadow);
    }

    /* Spine line */
    .spine {
      width: 2px;
      background: linear-gradient(to bottom, transparent, #111 10%, #222 50%, #111 90%, transparent);
      flex-shrink: 0;
      align-self: stretch;
    }

    /* Page number overlay */
    .page-num {
      position: absolute;
      bottom: 10px;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
    }

    .page-left .page-num { right: 16px; }
    .page-right .page-num { left: 16px; }
    .page-single .page-num { left: 50%; transform: translateX(-50%); }

    /* Flip animation */
    .flip-out-right {
      animation: flipOutRight 0.25s ease-in forwards;
      transform-origin: left center;
    }

    .flip-in-right {
      animation: flipInRight 0.25s ease-out forwards;
      transform-origin: left center;
    }

    .flip-out-left {
      animation: flipOutLeft 0.25s ease-in forwards;
      transform-origin: right center;
    }

    .flip-in-left {
      animation: flipInLeft 0.25s ease-out forwards;
      transform-origin: right center;
    }

    @keyframes flipOutRight {
      from { transform: rotateY(0deg); opacity: 1; }
      to   { transform: rotateY(-25deg); opacity: 0; }
    }

    @keyframes flipInRight {
      from { transform: rotateY(25deg); opacity: 0; }
      to   { transform: rotateY(0deg); opacity: 1; }
    }

    @keyframes flipOutLeft {
      from { transform: rotateY(0deg); opacity: 1; }
      to   { transform: rotateY(25deg); opacity: 0; }
    }

    @keyframes flipInLeft {
      from { transform: rotateY(-25deg); opacity: 0; }
      to   { transform: rotateY(0deg); opacity: 1; }
    }

    /* Thumbnail strip */
    .thumb-strip {
      height: 80px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .thumb {
      flex-shrink: 0;
      cursor: pointer;
      border: 1.5px solid transparent;
      border-radius: 3px;
      overflow: hidden;
      transition: border-color 0.15s, opacity 0.15s;
      opacity: 0.5;
      height: 60px;
    }

    .thumb:hover { opacity: 0.8; }

    .thumb.active {
      border-color: var(--accent);
      opacity: 1;
    }

    .thumb canvas {
      display: block;
      height: 60px;
      width: auto;
    }

    /* Keyboard hint */
    .hint {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      pointer-events: none;
      white-space: nowrap;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .topbar-center { gap: 4px; }
      .doc-name { max-width: 120px; }
      .spread { gap: 0; }
      .stage { padding: 16px 8px; }
    }
  </style>
</head>
<body>

<!-- ── UPLOAD SCREEN ── -->
<div id="upload-screen">
  <p class="brand">Flipbook Studio</p>
  <h1 class="upload-title">Sube tu PDF.<br><span>Pásealo como revista.</span></h1>

  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept="application/pdf" />
    <svg class="drop-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="8" y="6" width="32" height="36" rx="3"/>
      <path d="M16 18h16M16 26h16M16 34h8"/>
      <path d="M30 2v10h10" stroke-linecap="round"/>
    </svg>
    <p class="drop-label">Arrastra tu PDF aquí</p>
    <p class="drop-sub">o haz clic para buscar</p>
  </div>
</div>

<!-- ── LOADING SCREEN ── -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <p class="loader-text">Cargando documento…</p>
</div>

<!-- ── VIEWER SCREEN ── -->
<div id="viewer-screen">
  <div class="topbar">
    <div class="topbar-left">
      <span class="doc-name" id="doc-name">—</span>
      <span class="page-badge" id="page-badge">— / —</span>
    </div>

    <div class="topbar-center">
      <button class="nav-btn" id="btn-first" title="Primera página">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 2v10M11 2L6 7l5 5"/>
        </svg>
      </button>
      <button class="nav-btn" id="btn-prev" title="Anterior (←)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 2L4 7l5 5"/>
        </svg>
      </button>

      <div class="page-input-wrap">
        <input class="page-input" id="page-input" type="number" min="1" />
        <span id="total-pages-label">/ —</span>
      </div>

      <button class="nav-btn" id="btn-next" title="Siguiente (→)">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 2l5 5-5 5"/>
        </svg>
      </button>
      <button class="nav-btn" id="btn-last" title="Última página">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M11 2v10M3 2l5 5-5 5"/>
        </svg>
      </button>
    </div>

    <div class="topbar-right">
      <button class="zoom-btn" id="btn-zoom-out" title="Alejar">−</button>
      <span class="zoom-level" id="zoom-label">100%</span>
      <button class="zoom-btn" id="btn-zoom-in" title="Acercar">+</button>
      <button class="new-file-btn" id="btn-new">Nuevo PDF</button>
    </div>
  </div>

  <div class="stage" id="stage">
    <div class="spread" id="spread"></div>
    <p class="hint" id="hint">← → para navegar · scroll para zoom</p>
  </div>

  <div class="thumb-strip" id="thumb-strip"></div>
</div>

<script>
  // pdf.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──
  let pdfDoc = null;
  let totalPages = 0;
  let currentSpread = 0;   // 0-based spread index
  let zoom = 1.0;
  let renderedPages = {};   // cache: pageNum → ImageBitmap url
  let thumbCache = {};
  let fileName = '';
  let animating = false;

  // Spread mode: each spread shows 2 pages (left=even, right=odd)
  // Page 1 shown alone (cover), then pairs (2-3), (4-5), …
  // spreadIndex 0 → page 1
  // spreadIndex 1 → pages 2,3
  // spreadIndex n → pages 2n, 2n+1

  function spreadToPages(si) {
    if (si === 0) return [1];
    const left = si * 2;
    const right = left + 1;
    return right <= totalPages ? [left, right] : [left];
  }

  function pageToSpread(p) {
    if (p <= 1) return 0;
    return Math.ceil((p - 1) / 2);
  }

  function totalSpreads() {
    return Math.ceil((totalPages + 1) / 2);
  }

  // ── DOM refs ──
  const uploadScreen = document.getElementById('upload-screen');
  const loadingScreen = document.getElementById('loading-screen');
  const viewerScreen = document.getElementById('viewer-screen');
  const spread = document.getElementById('spread');
  const thumbStrip = document.getElementById('thumb-strip');
  const stage = document.getElementById('stage');

  // ── Upload ──
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadPDF(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') loadPDF(file);
  });

  document.getElementById('btn-new').addEventListener('click', () => {
    pdfDoc = null;
    renderedPages = {};
    thumbCache = {};
    viewerScreen.style.display = 'none';
    uploadScreen.style.display = 'flex';
    fileInput.value = '';
  });

  // ── Load PDF ──
  async function loadPDF(file) {
    fileName = file.name.replace(/\.pdf$/i, '');
    uploadScreen.style.display = 'none';
    loadingScreen.style.display = 'flex';

    const arrayBuffer = await file.arrayBuffer();
    pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    totalPages = pdfDoc.numPages;
    currentSpread = 0;
    zoom = 1.0;

    document.getElementById('doc-name').textContent = fileName;
    document.getElementById('total-pages-label').textContent = `/ ${totalPages}`;

    loadingScreen.style.display = 'none';
    viewerScreen.style.display = 'flex';

    await buildThumbStrip();
    await renderSpread(0, null);
  }

  // ── Compute base scale to fit stage ──
  function computeScale() {
    const stageW = stage.clientWidth - 80;
    const stageH = stage.clientHeight - 80;
    const isTwoPage = currentSpread > 0 && spreadToPages(currentSpread).length === 2;
    const targetW = isTwoPage ? stageW / 2 : Math.min(stageW, stageH * 0.75);
    const targetH = stageH;
    // Use A4 ratio as baseline
    const pageH = targetH;
    const pageW = Math.min(targetW, pageH * 0.707);
    return (pageW / 595) * zoom; // 595 = A4 pt width
  }

  // ── Render a page to canvas at scale ──
  async function renderPage(pageNum, scale) {
    const page = await pdfDoc.getPage(pageNum);
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    return canvas;
  }

  // ── Render spread ──
  async function renderSpread(si, direction) {
    const pages = spreadToPages(si);
    const scale = computeScale();

    // Render canvases
    const canvases = await Promise.all(pages.map(p => renderPage(p, scale)));

    // Build new spread HTML
    const newSpread = document.createElement('div');
    newSpread.style.display = 'flex';
    newSpread.style.gap = '0';
    newSpread.style.alignItems = 'stretch';

    const isSingle = pages.length === 1;

    pages.forEach((p, i) => {
      const slot = document.createElement('div');
      slot.className = 'page-slot ' + (isSingle ? 'page-single' : (i === 0 ? 'page-left' : 'page-right'));

      slot.appendChild(canvases[i]);

      const num = document.createElement('span');
      num.className = 'page-num';
      num.textContent = p;
      slot.appendChild(num);

      newSpread.appendChild(slot);

      if (!isSingle && i === 0) {
        const spine = document.createElement('div');
        spine.className = 'spine';
        newSpread.appendChild(spine);
      }
    });

    // Animate
    const oldEl = spread.firstChild;

    if (direction && oldEl) {
      const outClass = direction === 'next' ? 'flip-out-right' : 'flip-out-left';
      const inClass  = direction === 'next' ? 'flip-in-right'  : 'flip-in-left';

      oldEl.classList.add(outClass);
      newSpread.classList.add(inClass);
      spread.appendChild(newSpread);

      await new Promise(r => setTimeout(r, 250));
      oldEl.remove();
    } else {
      spread.innerHTML = '';
      spread.appendChild(newSpread);
    }

    // Update controls
    updateControls(si);
    updateThumbHighlight();
  }

  // ── Update topbar controls ──
  function updateControls(si) {
    const pages = spreadToPages(si);
    const firstPage = pages[0];
    const lastPage = pages[pages.length - 1];

    document.getElementById('page-badge').textContent = `${firstPage}–${lastPage} / ${totalPages}`.replace('–', pages.length === 1 ? '' : '–').replace(/(\d+)–(\1)/, '$1');
    document.getElementById('page-input').value = firstPage;
    document.getElementById('zoom-label').textContent = Math.round(zoom * 100) + '%';

    document.getElementById('btn-prev').disabled  = si <= 0;
    document.getElementById('btn-first').disabled = si <= 0;
    document.getElementById('btn-next').disabled  = si >= totalSpreads() - 1;
    document.getElementById('btn-last').disabled  = si >= totalSpreads() - 1;
  }

  // ── Thumbnail strip ──
  async function buildThumbStrip() {
    thumbStrip.innerHTML = '';
    const scale = 0.12;
    for (let p = 1; p <= totalPages; p++) {
      const thumb = document.createElement('div');
      thumb.className = 'thumb';
      thumb.dataset.page = p;

      const canvas = await renderPage(p, scale);
      thumb.appendChild(canvas);

      thumb.addEventListener('click', () => {
        const si = pageToSpread(p);
        goToSpread(si, si > currentSpread ? 'next' : 'prev');
      });

      thumbStrip.appendChild(thumb);
    }
    updateThumbHighlight();
  }

  function updateThumbHighlight() {
    const pages = spreadToPages(currentSpread);
    document.querySelectorAll('.thumb').forEach(t => {
      const p = parseInt(t.dataset.page);
      t.classList.toggle('active', pages.includes(p));
    });

    // Scroll active thumb into view
    const active = thumbStrip.querySelector('.thumb.active');
    if (active) active.scrollIntoView({ inline: 'center', behavior: 'smooth' });
  }

  // ── Navigation ──
  async function goToSpread(si, direction) {
    if (animating || si < 0 || si >= totalSpreads() || si === currentSpread) return;
    animating = true;
    currentSpread = si;
    await renderSpread(si, direction);
    animating = false;
  }

  document.getElementById('btn-prev').addEventListener('click', () =>
    goToSpread(currentSpread - 1, 'prev'));

  document.getElementById('btn-next').addEventListener('click', () =>
    goToSpread(currentSpread + 1, 'next'));

  document.getElementById('btn-first').addEventListener('click', () =>
    goToSpread(0, 'prev'));

  document.getElementById('btn-last').addEventListener('click', () =>
    goToSpread(totalSpreads() - 1, 'next'));

  document.getElementById('page-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const p = parseInt(e.target.value);
      if (p >= 1 && p <= totalPages) {
        const si = pageToSpread(p);
        goToSpread(si, si > currentSpread ? 'next' : 'prev');
      }
    }
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!pdfDoc) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown')
      goToSpread(currentSpread + 1, 'next');
    else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp')
      goToSpread(currentSpread - 1, 'prev');
    else if (e.key === 'Home') goToSpread(0, 'prev');
    else if (e.key === 'End')  goToSpread(totalSpreads() - 1, 'next');
  });

  // ── Zoom ──
  document.getElementById('btn-zoom-in').addEventListener('click', () => {
    zoom = Math.min(zoom + 0.25, 3);
    if (pdfDoc) renderSpread(currentSpread, null);
  });

  document.getElementById('btn-zoom-out').addEventListener('click', () => {
    zoom = Math.max(zoom - 0.25, 0.5);
    if (pdfDoc) renderSpread(currentSpread, null);
  });

  stage.addEventListener('wheel', e => {
    if (!pdfDoc || !e.ctrlKey) return;
    e.preventDefault();
    zoom = Math.max(0.5, Math.min(3, zoom - e.deltaY * 0.001));
    renderSpread(currentSpread, null);
  }, { passive: false });

  // ── Touch swipe ──
  let touchStartX = 0;
  stage.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  stage.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) goToSpread(currentSpread + 1, 'next');
      else goToSpread(currentSpread - 1, 'prev');
    }
  }, { passive: true });

  // ── Resize ──
  window.addEventListener('resize', () => {
    if (pdfDoc) renderSpread(currentSpread, null);
  });
</script>
</body>
</html>
